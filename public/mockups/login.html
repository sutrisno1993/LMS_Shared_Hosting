<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — LMS SMK 11 Maret</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --indigo: #4F46E5;
      --violet: #7C3AED;
      --dark: #0F0C29;
      --dark2: #1E1B4B;
      --glass: rgba(255,255,255,0.07);
      --glass-border: rgba(255,255,255,0.15);
      --text: #F8FAFC;
      --text-muted: #94A3B8;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0F0C29 0%, #302B63 50%, #24243e 100%);
      overflow: hidden;
      position: relative;
    }

    /* Animated background orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 400px; height: 400px; background: #4F46E5; top: -100px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 300px; height: 300px; background: #7C3AED; bottom: -80px; right: -80px; animation-delay: 3s; }
    .orb-3 { width: 200px; height: 200px; background: #2563EB; bottom: 100px; left: 200px; animation-delay: 5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }

    /* Grid overlay */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    .login-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 440px;
      padding: 16px;
    }

    .card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, var(--indigo), var(--violet));
      border-radius: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(79,70,229,0.4);
    }

    .logo-title {
      color: var(--text);
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .logo-subtitle {
      color: var(--text-muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .form-group { margin-bottom: 20px; }

    label {
      display: block;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      opacity: 0.5;
    }

    input {
      width: 100%;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px 16px 14px 44px;
      color: var(--text);
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.2s;
    }

    input::placeholder { color: rgba(255,255,255,0.25); }
    input:focus {
      border-color: var(--indigo);
      background: rgba(79,70,229,0.1);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.2);
    }

    .role-selector {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    .role-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 10px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .role-btn:hover { border-color: var(--indigo); color: var(--text); background: rgba(79,70,229,0.15); }
    .role-btn.active { background: rgba(79,70,229,0.25); border-color: var(--indigo); color: var(--text); }

    .role-icon { font-size: 18px; display: block; margin-bottom: 4px; }

    .btn-login {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--indigo), var(--violet));
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 20px rgba(79,70,229,0.4);
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(79,70,229,0.5);
    }

    .btn-login::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    }

    .secure-badge {
      text-align: center;
      margin-top: 24px;
      color: var(--text-muted);
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .dot { width: 6px; height: 6px; background: #22C55E; border-radius: 50%; display: inline-block; animation: pulse-dot 2s infinite; }
    @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    .divider {
      height: 1px;
      background: var(--glass-border);
      margin: 20px 0;
    }

    .forgot { text-align: right; margin-top: -12px; margin-bottom: 16px; }
    .forgot a { color: var(--indigo); font-size: 12px; text-decoration: none; }
    .forgot a:hover { color: var(--violet); }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="login-wrapper">
    <div class="card">
      <div class="logo-area">
        <div class="logo-icon">🎓</div>
        <div class="logo-title">LMS SMK 11 Maret</div>
        <div class="logo-subtitle">Learning Management System — TP 2026/2027</div>
      </div>

      <div class="form-group">
        <label>Masuk Sebagai</label>
        <div class="role-selector">
          <button class="role-btn" onclick="setRole(this)"><span class="role-icon">⚙️</span>Admin Kurikulum</button>
          <button class="role-btn active" onclick="setRole(this)"><span class="role-icon">📚</span>Guru</button>
          <button class="role-btn" onclick="setRole(this)"><span class="role-icon">🏠</span>Wali Kelas</button>
          <button class="role-btn" onclick="setRole(this)"><span class="role-icon">🎒</span>Siswa</button>
        </div>
      </div>

      <div class="form-group">
        <label>Email / Username</label>
        <div class="input-wrapper">
          <span class="input-icon">✉️</span>
          <input type="email" placeholder="nama@smk11maret.sch.id" value="reza.patriota@smk11maret.sch.id" />
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input type="password" placeholder="••••••••" value="password123" />
        </div>
      </div>

      <div class="forgot"><a href="#">Lupa password?</a></div>

      <button class="btn-login" onclick="this.textContent='Masuk...'">Masuk ke Dashboard →</button>

      <div class="divider"></div>

      <div class="secure-badge">
        <span class="dot"></span>
        Secure Login — SMK 11 Maret &nbsp;|&nbsp; Laravel 12 + Sanctum
      </div>
    </div>
  </div>

  <script>
    function setRole(el) {
      document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
    }
  </script>
</body>
</html>
